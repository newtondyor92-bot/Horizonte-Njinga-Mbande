*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif}
body{background:#f5f9ff;color:#0a1f44}
header{border-radius: 0px 0px 12px 12px;background:#0a3d91;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}

nav a{color:#fff;margin:0 10px;text-decoration:none;font-weight:500}
.btn{background:#1e6bff;color:#fff;padding:10px 15px;border-radius:5px;text-decoration:none}
.container{padding:40px 20px}
.title{font-size:32px;margin-bottom:10px;}
.subtitle{color:#555;margin-bottom:30px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(370px,1fr));gap:20px}
.card{height: 500px; background: #003366;/*background-image: url("imagem\ actividades/Fundo do footer.png")*/;border-radius:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);transition:0.6s}
.card:hover{transform:translateY(-6px)}
.card img{width:100%;height:270px;object-fit:scale-down;transform: scale(1.0);}
.card-content{padding:15px}
.date{font-size:12px;color:#ffffff;margin-bottom:8px}
.card-title{font-size:20px;font-weight:bold;margin-bottom:25px;color:rgb(28, 205, 236);}
.card a{color:rgb(28, 205, 236);font-size: 20px;}
.card-desc{font-size:14px;color:#ebdede;}

@media(max-width:768px){
.title{font-size:24px}
}
/*parte do rodape*/

.footer {
  background: #0f172a;
  color: #fff;
  padding: 40px 20px;
  font-family: Arial, sans-serif;
  
}

.footer-container {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 30px;
  max-width: 1100px;
  margin: auto;
}

.footer h2, .footer h3 {
  margin-bottom: 10px;
}

.footer a {
  display: block;
  color: #cbd5e1;
  text-decoration: none;
  margin: 5px 0;
  transition: 0.3s;
}

.footer a:hover {

  transform: translateX(5px);
}

.footer-social .icons {
  display: flex;
  gap: 15px;
  font-size: 34px;
}

.footer-social .icons a {
  background: #071122;
  padding: 10px;
  border-radius: 50%;
  transition: 0.3s;
}

.footer-social .icons a:hover {
  background: #38bdf8;
  transform: scale(1.1);
}

.footer-bottom {
  text-align: center;
  margin-top: 30px;
  border-top: 1px solid #1e293b;
  padding-top: 15px;
  color: #94a3b8;
}

/* RESPONSIVO */
@media (max-width: 768px) {

    text-align: center;

}
