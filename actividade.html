    <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividades e Notícias</title>
<style>
    :root{
        --cor_dos_card:#003366;
    }
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif}
body{background:#f5f9ff;color:#0a1f44}
header{background:#0a3d91;color:#fff;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#fff;margin:0 10px;text-decoration:none;font-weight:500}
.btn{background:#1e6bff;color:#fff;padding:10px 15px;border-radius:5px;text-decoration:none}
.container{padding:40px 20px}
.title{font-size:32px;margin-bottom:10px;}
.subtitle{color:#555;margin-bottom:30px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px}
.card{height: 430px; background: #003366;/*background-image: url("imagem\ actividades/Fundo do footer.png")*/;border-radius:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);transition:0.6s}
.card:hover{transform:translateY(-6px)}
.card img{width:100%;height:270px;object-fit:scale-down;transform: scale(1.1);}
.card-content{padding:15px}
.date{font-size:12px;color:#ffffff;margin-bottom:8px}
.card-title{font-size:18px;font-weight:bold;margin-bottom:5px;color:white;}
.card-desc{font-size:14px;color:#555}
footer{background:#0a3d91;color:#fff;text-align:center;padding:15px;margin-top:40px}
@media(max-width:768px){
.title{font-size:24px}
}
</style>
</head>
<body>
<header>
<div><strong>Cultura+</strong></div>
<nav>
<a href="#">Home</a>
<a href="#">Eventos</a>
<a href="#">Cursos</a>
<a href="#">Contato</a>
</nav>
<a href="#" class="btn">Comprar Bilhete</a>
</header>
<div class="container">

</div>
<footer>

</footer>

const container = document.getElementById('cards')

`
container.appendChild(card)
})
